<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Ticket | TicketManager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="book.html">Book Ticket</a>
    </nav>
    <div class="container">
        <h1>Book Your Ticket</h1>
        <p>Enter your details to process your booking via Java.</p>
        <hr>
        <form action="success.html" method="GET">
            <input type="text" name="passengerName" placeholder="Full Name" required 
                   style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
            
            <input type="text" name="destination" placeholder="Destination" required 
                   style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
            
            <button type="submit" style="width: 100%; padding: 12px; background-color: #1abc9c; color: white; border: none; border-radius: 5px; cursor: pointer;">
                Process Booking
            </button>
        </form>
    </div>
</body>
</html>
